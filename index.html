<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drix Viewer — Parquet Viewer</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-alt: #f7f8fa;
        --bg-hover: #eef0f3;
        --fg: #1a1d21;
        --fg-muted: #6b7280;
        --border: #e3e6ea;
        --accent: #3b82f6;
        --accent-fg: #ffffff;
        --danger: #dc2626;
        --chip-bg: #eef2ff;
        --chip-fg: #4338ca;
        --row-hover: #f5f7fb;
        --row-alt: #fafbfc;
        --row-selected: #dbeafe;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      :root[data-theme="dark"] {
        --bg: #0e1116;
        --bg-alt: #161b22;
        --bg-hover: #1f242c;
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --border: #30363d;
        --accent: #4493f8;
        --accent-fg: #ffffff;
        --danger: #f87171;
        --chip-bg: #1f2a44;
        --chip-fg: #93c5fd;
        --row-hover: #161b22;
        --row-alt: #11161d;
        --row-selected: #1e3a5f;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        line-height: 1.4;
      }
      button {
        font: inherit;
        color: inherit;
        background: var(--bg-alt);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
      }
      button:hover { background: var(--bg-hover); }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: var(--accent);
      }
      input, select, textarea {
        font: inherit;
        color: inherit;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 3px 6px;
      }
      input:focus, select:focus, textarea:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
