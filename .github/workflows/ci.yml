name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  WRANGLER_SEND_METRICS: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx biome ci .
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build
