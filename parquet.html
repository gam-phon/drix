<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Drix — Parquet Viewer</title>
    <meta
      name="description"
      content="Inspect, sort, filter and query .parquet files in your browser. No upload, no backend — your data never leaves the page."
    />
    <link rel="canonical" href="https://drix-viewer.com/parquet" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("drix.theme");
          if (t !== "dark" && t !== "light") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
